<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Minha Página</title>
</head>
<body>

    <h1>Minha Página</h1>

    <!-- Seus botões corrigidos (com IDs diferentes) -->
    <button id="btnDados">insira seus dados</button>
    <button id="btnEndereco">pesquise endereço</button>

    <!-- Código JavaScript para fazer os botões funcionarem -->
    <script>
        const botaoDados = document.getElementById('btnDados');
        botaoDados.addEventListener('click', () => {
            alert('Você clicou em: insira seus dados');
        });

        const botaoEndereco = document.getElementById('btnEndereco');
        botaoEndereco.addEventListener('click', () => {
            alert('Você clicou em: pesquise endereço');
        });
    </script>

</body>
</html>
