<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Começo de Tudo</title>
    <style>

        /*mover botões*/
        #btnEndereco { 
                    margin-left: 50px; /* jogando um pouco para a direita */
                   margin-down: 200px; /* jogando um pouco para baixo*/
            #btnDados { background-color: blue; } /*O botão nasce azul*/
            #btnDados:hover { background-color: darkblue; } 
                  }
    </style>
</head>
<body>

    <h1>Minha Página</h1>

    <!-- Botões com IDs diferentes para o JavaScript não se confundir -->
    <button id="btnDados" class="texto-destaque">insira seus dados</button>
    <button id="btnEndereco" class="texto-destaque">pesquise endereço</button>

    

    <!-- Sua imagem -->
    <!-- Código correto para exibir a imagem direto na tela -->
<img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiuNVEdQJVsKEiZPcOaIa6pcT7UoS1sp6TwV07gXM19X9MtzVBJdw_6qCW58vpyOm7XMmm9tg6hxTW4SFHLEADBihfVhIhkQCYkzy0oJMU7HcGZ2nuwKn5kFwjZemYmqQvBtq57dvTP-HU/s800/job_tantei_woman.png" alt="Detetive procurando erros" width="200">


    <!-- O código que dá vida aos botões -->
    <script>
        // Funcionalidade do botão 1
        const botaoDados = document.getElementById('btnDados');
        botaoDados.addEventListener('click', () => {
            alert('Você clicou em: insira seus dados');
        });

        // Funcionalidade do botão 2
        const botaoEndereco = document.getElementById('btnEndereco');
        botaoEndereco.addEventListener('click', () => {
            alert('Você clicou em: pesquise endereço');
        });
    </script>

</body>
</html>
