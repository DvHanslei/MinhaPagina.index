<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Pesquisa da Detetive</title>

    <style>
        /* Centraliza e organiza a imagem e o botão lado a lado */
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        /* Estilo do botão de pesquisar */
        #btnEndereco {
            background-color: #008CBA; /* Cor azul moderna */
            color: white;              /* Letra branca */
            border: none;              /* Remove a borda padrão */
            padding: 12px 24px;        /* Deixa o botão gordinho */
            border-radius: 6px;        /* Cantos arredondados */
            font-size: 16px;           /* Tamanho da letra */
            cursor: pointer;           /* Mãozinha de clique */
            
            /* Posicionamento na frente da detetive */
            margin-left: 20px;         /* Afasta o botão da imagem */
            vertical-align: hight;    /* Alinha a altura com o meio da imagem */
        }

        /* Efeito de acender ao passar o mouse */
        #btnEndereco:hover {
            background-color: #005f7a; /* Azul mais escuro */
        }

        /* Garante que a imagem fique alinhada com o botão */
        img {
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <h1>Minha Página</h1>

    <!-- 1. A Detetive vem primeiro -->
  <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiuNVEdQJVsKEiZPcOaIa6pcT7UoS1sp6TwV07gXM19X9MtzVBJdw_6qCW58vpyOm7XMmm9tg6hxTW4SFHLEADBihfVhIhkQCYkzy0oJMU7HcGZ2nuwKn5kFwjZemYmqQvBtq57dvTP-HU/s800/job_tantei_woman.png" alt="Detetive procurando erros" width="200">


    <!-- 2. O único botão de pesquisar vem logo na frente dela -->
    <button id="btnEndereco">pesquise endereço</button>

    <!-- O JavaScript que faz o botão abrir o Google Maps -->
    <script>
        const botaoEndereco = document.getElementById('btnEndereco');
        botaoEndereco.addEventListener('click', () => {
            window.open('https://www.google.com/maps/@35.9111618,139.6197098,15z?entry=ttu&g_ep=EgoyMDI2MDUyNy4wIKXMDSoASAFQAw%3D%3D', '_blank');
        });
    </script>

</body>
</html>
